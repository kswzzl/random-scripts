================================================================================
 Agent Fleet — Network Policies v2
 Replace UNITNAME throughout. Apply with:
   kubectl apply -n unit-UNITNAME -f network-policies.yaml
================================================================================


--- POLICY SUMMARY -------------------------------------------------------------

  agent pods (role: agent)
    CAN  --> squid:3128              policy: agent-egress
    CAN  --> mcp-server:8080         policy: agent-egress
    CAN  --> kube-dns:53             policy: dns-restrict
             only *.svc.cluster.local
    DENY --> everything else         policy: default-deny-all

  squid pods (role: proxy)
    ACCEPTS <-- agents on 3128       policy: squid-policy
    ACCEPTS <-- mcp on 3128          policy: squid-policy
    CAN     --> anything             policy: squid-policy
    DENY    <-- everything else      policy: default-deny-all

  mcp pods (role: mcp)
    ACCEPTS <-- agents on 8080       policy: mcp-policy
    CAN     --> squid:3128           policy: mcp-egress
    CAN     --> kube-dns:53          policy: dns-restrict
                only *.svc.cluster.local
    DENY    --> everything else      policy: default-deny-all

  any unlabeled pod
    DENY    --> everything           policy: default-deny-all


--- REQUIRED POD LABELS --------------------------------------------------------

  Agent pods:     role: agent
  Squid pods:     role: proxy
  MCP pods:       role: mcp


--- TRAFFIC FLOW ---------------------------------------------------------------

  agent ──3128──> squid ──internet──> api.anthropic.com (filtered by squid.conf)
  agent ──8080──> mcp
                  mcp ──3128──> squid ──internet──> (tool calls, filtered)
  agent ──53────> kube-dns (cluster-internal names only)
  mcp   ──53────> kube-dns (cluster-internal names only)
  squid ──53────> kube-dns ──forward──> external DNS (squid needs this)


================================================================================
 YAML — save everything below this line as network-policies.yaml
================================================================================

# --- 1. Default deny all ingress + egress for every pod ---------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# --- 2. DNS restrict for agents and MCP (CiliumNetworkPolicy) ---------------
# Both agents and MCP can only resolve *.svc.cluster.local.
# No external DNS queries, no DNS exfil path.
# External domain resolution is handled by squid, not by agents or MCP.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: dns-restrict
spec:
  endpointSelector:
    matchExpressions:
    - key: role
      operator: In
      values:
      - agent
      - mcp
  egress:
  - toEndpoints:
    - matchLabels:
        k8s-app: kube-dns
        k8s:io.kubernetes.pod.namespace: kube-system
    toPorts:
    - ports:
      - port: "53"
        protocol: ANY
      rules:
        dns:
        - matchPattern: "*.svc.cluster.local"
---
# --- 3. Agent egress — squid + MCP only -------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-egress
spec:
  podSelector:
    matchLabels:
      role: agent
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          role: proxy
    ports:
    - port: 3128
      protocol: TCP
  - to:
    - podSelector:
        matchLabels:
          role: mcp
    ports:
    - port: 8080
      protocol: TCP
---
# --- 4. MCP egress — squid only ---------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-egress
spec:
  podSelector:
    matchLabels:
      role: mcp
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          role: proxy
    ports:
    - port: 3128
      protocol: TCP
---
# --- 5. Squid policy — accepts from agents + MCP, unrestricted egress -------
# Squid.conf allowlist handles domain filtering at the HTTP layer.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: squid-policy
spec:
  podSelector:
    matchLabels:
      role: proxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - port: 3128
      protocol: TCP
  - from:
    - podSelector:
        matchLabels:
          role: mcp
    ports:
    - port: 3128
      protocol: TCP
  egress:
  - {}
---
# --- 6. MCP ingress — accepts from agents only ------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-policy
spec:
  podSelector:
    matchLabels:
      role: mcp
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          role: agent
    ports:
    - port: 8080
      protocol: TCP
